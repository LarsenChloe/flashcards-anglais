<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Anglais — Chloé</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Avenir Next', 'Avenir', Arial, sans-serif; background: #fdf0f4; color: #2a1a20; min-height: 100vh; padding: 16px 16px 72px; -webkit-font-smoothing: antialiased; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 14px; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
select, button { font-size: 13px; padding: 0 14px; height: 36px; border: 1px solid #d4a0b0; border-radius: 8px; background: #fffafc; cursor: pointer; font-family: inherit; }
button:active { transform: scale(0.98); }
.save-row { display: flex; gap: 8px; margin-bottom: 12px; }
.btn-save { background: #fff0f3; color: #9b1a2e; border-color: #f0b8c4; }
.btn-load { background: #fdf5f7; color: #7a2a40; border-color: #e8c8d4; }
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 10px; }
.stat { background: #f7dde5; border-radius: 8px; padding: 10px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 500; }
.stat-l { font-size: 11px; color: #777; }
.pbar { height: 4px; background: #ddd; border-radius: 2px; margin-bottom: 10px; }
.pfill { height: 100%; background: #c0394a; border-radius: 2px; transition: width .3s; }
.mode-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.mode-row label { font-size: 12px; color: #666; }
.card { background: #fffafc; border: 1px solid #e8c8d4; border-radius: 14px; padding: 2rem 1.5rem; cursor: pointer; min-height: 190px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 10px; user-select: none; }
.fc-theme { font-size: 11px; color: #aaa; margin-bottom: 10px; letter-spacing: .04em; }
.fc-word { font-size: 26px; font-weight: 500; text-align: center; line-height: 1.3; }
.fc-hint { font-size: 12px; color: #bbb; margin-top: 18px; }
.fc-sep { width: 100%; border-top: 1px solid #f0f0f0; margin-top: 16px; padding-top: 14px; }
.fc-fr { font-size: 19px; color: #555; text-align: center; margin-bottom: 8px; }
.fc-ex { font-size: 13px; color: #aaa; font-style: italic; text-align: center; }
.nav { display: flex; gap: 8px; justify-content: center; align-items: center; margin-bottom: 10px; }
.nav-info { font-size: 13px; color: #888; min-width: 80px; text-align: center; }
.vote { display: flex; gap: 8px; justify-content: center; }
.vote button { flex: 1; max-width: 180px; }
.btn-ok { background: #f0fdf4; color: #166534; border-color: #86efac; }
.btn-ko { background: #fef2f2; color: #991b1b; border-color: #fca5a5; }
.ok-n { color: #16a34a; }
.ko-n { color: #dc2626; }
/* EXERCISES */
.ex-card { background: #fffafc; border: 1px solid #e8c8d4; border-radius: 14px; padding: 1.5rem; min-height: 200px; margin-bottom: 10px; }
.ex-cat-tag { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: #aaa; margin-bottom: 6px; }
.ex-num { font-size: 11px; color: #ccc; margin-bottom: 12px; }
.ex-question { font-size: 18px; font-weight: 500; line-height: 1.5; text-align: center; margin-bottom: 20px; }
.ex-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.ex-choice-btn { padding: 11px 8px; border-radius: 10px; font-size: 13px; cursor: pointer; border: 1px solid #e0e0e0; background: #fff5f8; color: #2a1a20; text-align: center; min-height: 52px; display: flex; align-items: center; justify-content: center; font-family: inherit; transition: all .15s; }
.ex-choice-btn:disabled { cursor: default; }
.ex-correct { background: #f0fdf4; border-color: #86efac; color: #166534; }
.ex-wrong { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
.ex-trou-wrap { display: flex; gap: 8px; margin-bottom: 12px; }
.ex-trou-input { flex: 1; height: 44px; border: 1px solid #ccc; border-radius: 8px; padding: 0 14px; font-size: 15px; font-family: inherit; outline: none; }
.ex-confirm-btn { height: 44px; padding: 0 16px; border-radius: 8px; background: #9b1a2e; color: white; border: none; font-size: 13px; font-family: inherit; cursor: pointer; }
.ex-feedback { margin-top: 14px; padding: 12px 14px; background: #fff5f8; border-radius: 8px; border: 1px solid #eee; }
.ex-feedback-result { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.ex-feedback-tip { font-size: 12px; color: #777; font-style: italic; }
.result-ok { color: #166534; }
.result-ko { color: #991b1b; }
/* NAV BAR */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 58px; background: #fffafc; border-top: 1px solid #e8c8d4; display: flex; z-index: 100; }
.bnav-btn { flex: 1; border: none; background: none; font-size: 13px; font-family: inherit; color: #999; cursor: pointer; font-weight: 400; }
.bnav-btn.active { color: #9b1a2e; font-weight: 600; }
.toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: #9b1a2e; color: white; font-size: 13px; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- PAGE VOCAB -->
<div id="page-flash">
<h1>Flashcards — Vocabulaire anglais</h1>
<div class="controls">
  <select id="sel-fiche"></select>
  <button onclick="fcShuffle()">Mélanger</button>
  <button onclick="fcResetScores()">Réinitialiser</button>
</div>
<div class="mode-row">
  <label>Sens :</label>
  <select id="sel-mode" onchange="fcBuildDeck()">
    <option value="en">Anglais → Français</option>
    <option value="fr">Français → Anglais</option>
    <option value="rand">Aléatoire</option>
  </select>
  <label style="margin-left:8px">Filtre :</label>
  <select id="sel-filter" onchange="fcBuildDeck()">
    <option value="all">Toutes</option>
    <option value="todo">À revoir</option>
    <option value="ok">Sus</option>
  </select>
</div>
<div class="save-row">
  <button class="btn-save" onclick="fcSave()">Sauvegarder</button>
  <button class="btn-load" onclick="document.getElementById('fc-file').click()">Charger</button>
  <input type="file" id="fc-file" accept=".json" style="display:none" onchange="fcLoad(event)">
</div>
<div class="stats">
  <div class="stat"><div class="stat-n" id="fc-s-total">—</div><div class="stat-l">total</div></div>
  <div class="stat"><div class="stat-n ok-n" id="fc-s-ok">0</div><div class="stat-l">sus</div></div>
  <div class="stat"><div class="stat-n ko-n" id="fc-s-ko">0</div><div class="stat-l">à revoir</div></div>
  <div class="stat"><div class="stat-n" id="fc-s-pct">—</div><div class="stat-l">score</div></div>
</div>
<div class="pbar"><div class="pfill" id="fc-pbar" style="width:0%"></div></div>
<div class="card" id="fc-card" onclick="fcFlip()">
  <div class="fc-theme" id="fc-theme"></div>
  <div class="fc-word" id="fc-word">Prêt !</div>
  <div class="fc-hint" id="fc-hint">— toucher pour retourner —</div>
  <div id="fc-answer" style="display:none" class="fc-sep">
    <div class="fc-fr" id="fc-fr"></div>
    <div class="fc-ex" id="fc-ex"></div>
  </div>
</div>
<div class="nav">
  <button onclick="fcGo(-1)">&#8592; Préc.</button>
  <span class="nav-info" id="fc-nav-info">—</span>
  <button onclick="fcGo(1)">Suiv. &#8594;</button>
</div>
<div class="vote" id="fc-vote" style="display:none">
  <button class="btn-ko" onclick="fcVote(false)">Je ne savais pas</button>
  <button class="btn-ok" onclick="fcVote(true)">Je savais !</button>
</div>
</div>

<!-- PAGE EXERCICES -->
<div id="page-ex" style="display:none">
<h1>Exercices de grammaire</h1>
<div class="controls">
  <select id="ex-cat" onchange="exBuild()">
    <option value="all">Toutes les catégories</option>
  </select>
  <select id="ex-type" onchange="exBuild()">
    <option value="all">QCM + Texte à trou</option>
    <option value="qcm">QCM uniquement</option>
    <option value="trou">Textes à trou</option>
  </select>
  <button onclick="exShuffle()">Mélanger</button>
  <button onclick="exReset()">Réinitialiser</button>
</div>
<div class="stats">
  <div class="stat"><div class="stat-n" id="ex-s-total">—</div><div class="stat-l">total</div></div>
  <div class="stat"><div class="stat-n ok-n" id="ex-s-ok">0</div><div class="stat-l">corrects</div></div>
  <div class="stat"><div class="stat-n ko-n" id="ex-s-ko">0</div><div class="stat-l">erreurs</div></div>
  <div class="stat"><div class="stat-n" id="ex-s-pct">—</div><div class="stat-l">score</div></div>
</div>
<div class="pbar"><div class="pfill" id="ex-pbar" style="width:0%"></div></div>
<div class="ex-card">
  <div class="ex-cat-tag" id="ex-cat-tag"></div>
  <div class="ex-num" id="ex-num"></div>
  <div class="ex-question" id="ex-question"></div>
  <div id="ex-choices" class="ex-choices"></div>
  <div id="ex-trou-wrap" class="ex-trou-wrap" style="display:none">
    <input type="text" id="ex-trou-input" class="ex-trou-input" placeholder="Ta réponse…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="ex-confirm-btn" onclick="exCheckTrou()">OK</button>
  </div>
  <div id="ex-feedback" style="display:none" class="ex-feedback">
    <div id="ex-feedback-result" class="ex-feedback-result"></div>
    <div id="ex-feedback-tip" class="ex-feedback-tip"></div>
  </div>
</div>
<div class="nav">
  <button onclick="exGo(-1)">&#8592; Préc.</button>
  <span class="nav-info" id="ex-nav-info">—</span>
  <button id="ex-next-btn" style="display:none" onclick="exNext()">Suiv. &#8594;</button>
</div>
</div>

<!-- BOTTOM NAV -->

<!-- PAGE DÉFI VOCAB -->
<div id="page-defi" style="display:none">
<h1>Défi vocabulaire</h1>
<div class="controls">
  <select id="defi-fiche" onchange="defiBuild()">
    <option value="all">Toutes les fiches</option>
  </select>
  <select id="defi-mode" onchange="defiBuild()">
    <option value="en">Anglais → Français</option>
    <option value="fr">Français → Anglais</option>
    <option value="rand">Aléatoire</option>
  </select>
</div>
<div class="stats">
  <div class="stat"><div class="stat-n" id="defi-s-streak">0</div><div class="stat-l">série</div></div>
  <div class="stat"><div class="stat-n" id="defi-s-record">0</div><div class="stat-l">record</div></div>
  <div class="stat"><div class="stat-n ok-n" id="defi-s-ok">0</div><div class="stat-l">corrects</div></div>
  <div class="stat"><div class="stat-n ko-n" id="defi-s-ko">0</div><div class="stat-l">erreurs</div></div>
</div>
<div class="ex-card" id="defi-card">
  <div class="ex-cat-tag" id="defi-fiche-tag"></div>
  <div class="ex-question" id="defi-question" style="font-size:22px;margin-bottom:24px"></div>
  <div style="display:flex;justify-content:center;gap:24px;margin:8px 0 4px">
    <canvas id="defi-g-left" width="120" height="280" style="display:none"></canvas>
    <canvas id="defi-g-right" width="120" height="280" style="display:none"></canvas>
  </div>
  <div id="defi-streak-display" style="display:none;text-align:center;font-size:36px;font-weight:500;color:#1a1a1a;margin:8px 0 2px">0</div>
  <div id="defi-streak-label" style="display:none;text-align:center;font-size:10px;color:#aaa;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px">série</div>
  <div id="defi-choices" class="ex-choices"></div>
  <div id="defi-feedback" style="display:none" class="ex-feedback">
    <div id="defi-feedback-result" class="ex-feedback-result"></div>
    <div id="defi-feedback-tip" style="font-size:12px;color:#777;font-style:italic;margin-top:4px"></div>
  </div>
</div>
<button id="defi-next-btn" style="display:none;width:100%;padding:14px;border-radius:10px;font-size:13px;font-family:inherit;background:#9b1a2e;color:white;border:none;cursor:pointer;margin-top:8px" onclick="defiNext()">Suivant →</button>
<button id="defi-restart-btn" style="display:none;width:100%;padding:14px;border-radius:10px;font-size:13px;font-family:inherit;background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;cursor:pointer;margin-top:8px" onclick="defiStart()">↺ Recommencer</button>
<button id="defi-start-btn" style="width:100%;padding:14px;border-radius:10px;font-size:13px;font-family:inherit;background:#9b1a2e;color:white;border:none;cursor:pointer;margin-top:8px" onclick="defiStart()">Commencer le défi</button>
</div>
<nav class="bottom-nav">
  <button class="bnav-btn active" id="bn-flash" onclick="showTab('flash')">Vocabulaire</button>
  <button class="bnav-btn" id="bn-ex" onclick="showTab('ex')">Grammaire</button>
  <button class="bnav-btn" id="bn-defi" onclick="showTab('defi')">Défi</button>
</nav>

<div class="toast" id="toast-el"></div>

<script>
function showToast(msg) {
  var t = document.getElementById('toast-el');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function showTab(tab) {
  document.getElementById('page-flash').style.display = tab === 'flash' ? 'block' : 'none';
  document.getElementById('page-ex').style.display = tab === 'ex' ? 'block' : 'none';
  document.getElementById('page-defi').style.display = tab === 'defi' ? 'block' : 'none';
  document.getElementById('bn-flash').classList.toggle('active', tab === 'flash');
  document.getElementById('bn-ex').classList.toggle('active', tab === 'ex');
  document.getElementById('bn-defi').classList.toggle('active', tab === 'defi');
  if (tab === 'ex' && !exInited) { exInit(); exInited = true; }
  if (tab === 'defi') { defiInitTab(); }
}

var fcDeck = [], fcIdx = 0, fcFlipped = false, fcScores = {}, fcMode = 'en';

var fcFichesSel = document.getElementById('sel-fiche');
var fiches = [];
ALL.forEach(function(d) { if (fiches.indexOf(d.fiche) < 0) fiches.push(d.fiche); });
fcFichesSel.innerHTML = '<option value="all">Toutes les fiches (' + ALL.length + ')</option>';
fiches.forEach(function(f) {
  var theme = ALL.find(function(d) { return d.fiche === f; }).theme;
  var o = document.createElement('option');
  o.value = f; o.textContent = f + ' — ' + theme;
  fcFichesSel.appendChild(o);
});
fcFichesSel.addEventListener('change', fcBuildDeck);

function fcBuildDeck() {
  var fv = fcFichesSel.value;
  var base = fv === 'all' ? ALL : ALL.filter(function(d) { return d.fiche === fv; });
  var filt = document.getElementById('sel-filter').value;
  if (filt === 'todo') base = base.filter(function(d) { return fcScores[d.en + d.fr] !== true; });
  if (filt === 'ok') base = base.filter(function(d) { return fcScores[d.en + d.fr] === true; });
  fcDeck = base.slice();
  fcIdx = 0; fcFlipped = false;
  fcUpdateStats(); fcRender();
}

function fcShuffle() {
  for (var i = fcDeck.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = fcDeck[i]; fcDeck[i] = fcDeck[j]; fcDeck[j] = tmp;
  }
  fcIdx = 0; fcFlipped = false; fcRender();
}

function fcResetScores() { fcScores = {}; fcBuildDeck(); }

function fcRender() {
  if (!fcDeck.length) {
    document.getElementById('fc-word').textContent = 'Aucune carte.';
    document.getElementById('fc-theme').textContent = '';
    document.getElementById('fc-hint').textContent = '';
    document.getElementById('fc-answer').style.display = 'none';
    document.getElementById('fc-vote').style.display = 'none';
    document.getElementById('fc-nav-info').textContent = '0 / 0';
    document.getElementById('fc-pbar').style.width = '0%';
    return;
  }
  var card = fcDeck[fcIdx];
  var mv = document.getElementById('sel-mode').value;
  fcMode = mv === 'rand' ? (Math.random() > 0.5 ? 'en' : 'fr') : mv;
  var q = fcMode === 'en' ? card.en : card.fr;
  var a = fcMode === 'en' ? card.fr : card.en;
  document.getElementById('fc-theme').textContent = card.fiche + ' · ' + card.theme;
  document.getElementById('fc-word').textContent = q;
  document.getElementById('fc-hint').textContent = fcFlipped ? '' : '— toucher pour retourner —';
  document.getElementById('fc-answer').style.display = fcFlipped ? 'block' : 'none';
  document.getElementById('fc-fr').textContent = a;
  document.getElementById('fc-ex').textContent = card.ex;
  document.getElementById('fc-nav-info').textContent = (fcIdx + 1) + ' / ' + fcDeck.length;
  document.getElementById('fc-vote').style.display = fcFlipped ? 'flex' : 'none';
  document.getElementById('fc-pbar').style.width = Math.round((fcIdx + 1) / fcDeck.length * 100) + '%';
}

function fcFlip() { if (!fcDeck.length) return; fcFlipped = !fcFlipped; fcRender(); }
function fcGo(dir) { if (!fcDeck.length) return; fcIdx = (fcIdx + dir + fcDeck.length) % fcDeck.length; fcFlipped = false; fcRender(); }
function fcVote(ok) {
  if (!fcDeck.length) return;
  var card = fcDeck[fcIdx];
  fcScores[card.en + card.fr] = ok;
  fcUpdateStats();
  if (ok && document.getElementById('sel-filter').value === 'todo') {
    fcDeck.splice(fcIdx, 1);
    if (fcIdx >= fcDeck.length) fcIdx = 0;
    fcFlipped = false; fcRender();
  } else { fcGo(1); }
}
function fcUpdateStats() {
  var fv = fcFichesSel.value;
  var base = fv === 'all' ? ALL : ALL.filter(function(d) { return d.fiche === fv; });
  var ok = base.filter(function(d) { return fcScores[d.en + d.fr] === true; }).length;
  var ko = base.filter(function(d) { return fcScores[d.en + d.fr] === false; }).length;
  document.getElementById('fc-s-total').textContent = base.length;
  document.getElementById('fc-s-ok').textContent = ok;
  document.getElementById('fc-s-ko').textContent = ko;
  var rated = ok + ko;
  document.getElementById('fc-s-pct').textContent = rated > 0 ? Math.round(ok / rated * 100) + '%' : '—';
}
function fcSave() {
  var ok = Object.values(fcScores).filter(function(v) { return v === true; }).length;
  var ko = Object.values(fcScores).filter(function(v) { return v === false; }).length;
  var data = { version: 2, prenom: 'Chloé', date: new Date().toISOString(), scores: fcScores, summary: { total: ALL.length, sus: ok, arevoir: ko } };
  var a = document.createElement('a');
  a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(data, null, 2));
  a.download = 'anglais_chloe_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  showToast('Sauvegardé !');
}
function fcLoad(e) {
  var f = e.target.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try { var d = JSON.parse(ev.target.result); fcScores = d.scores || {}; fcBuildDeck(); showToast('Chargé !'); }
    catch(err) { showToast('Fichier invalide.'); }
  };
  r.readAsText(f);
  e.target.value = '';
}

"Pronoms relatifs","type":"qcm","q":"The book ___ I read was amazing.","choices":["who","which","whose","—"],"a":1,"tip":"Pour une chose → which"},{"cat":"Pronoms relatifs","type":"trou","q":"The woman ___ car was stolen called police.","a":"whose","tip":"Possession → whose (dont)"},{"cat":"Prépositions","type":"qcm","q":"I'll meet you ___ Monday morning.","choices":["in","at","on","by"],"a":2,"tip":"Jour → on"},{"cat":"Prépositions","type":"qcm","q":"She was born ___ 1995.","choices":["in","at","on","by"],"a":0,"tip":"Année → in"},{"cat":"Prépositions","type":"qcm","q":"The meeting starts ___ 3 o'clock.","choices":["in","at","on","by"],"a":1,"tip":"Heure → at"},{"cat":"Prépositions","type":"trou","q":"He's been waiting ___ two hours.","a":"for","tip":"Durée → for"},{"cat":"Prépositions","type":"trou","q":"I haven't seen her ___ last summer.","a":"since","tip":"Point de départ → since"},{"cat":"Questions","type":"qcm","q":"___ does she live?","choices":["Where","When","What","Why"],"a":0,"tip":"Lieu → Where"},{"cat":"Questions","type":"qcm","q":"___ did you arrive?","choices":["Where","When","What","How"],"a":1,"tip":"Moment → When"},{"cat":"Questions","type":"trou","q":"___ have you been waiting? (duration)","a":"How long","tip":"Durée → How long"},{"cat":"Questions","type":"trou","q":"___ does it cost? (price)","a":"How much","tip":"Prix → How much"},{"cat":"Discours indirect","type":"qcm","q":"She said she ___ tired.","choices":["is","was","were","has been"],"a":1,"tip":"Présent → passé au discours indirect"},{"cat":"Discours indirect","type":"trou","q":"He said he ___ come the next day. (will)","a":"would","tip":"will → would au discours indirect"},{"cat":"Comparatifs","type":"qcm","q":"This is ___ interesting book I've read.","choices":["more","the most","most","very most"],"a":1,"tip":"Superlatif → the most"},{"cat":"Comparatifs","type":"qcm","q":"She runs ___ than her sister.","choices":["fast","faster","more fast","fastest"],"a":1,"tip":"Adjectif court → +er ,{"cat":"Conditionnel mixte","type":"qcm","q":"If she had studied medicine, she ___ a doctor now.","choices":["would be","would have been","will be","was"],"a":0,"tip":"Cond. mixte : If + past perfect (passé) → would + inf (présent)"},{"cat":"Conditionnel mixte","type":"qcm","q":"If he weren't so shy, he ___ asked her out years ago.","choices":["would","would have","will have","had"],"a":1,"tip":"Cond. mixte : If + past simple (présent) → would have + pp (passé)"},{"cat":"Conditionnel mixte","type":"trou","q":"If I had taken that job in Paris, I ___ (live) there now.","a":"would be living","tip":"Passé → conséquence présente : would be + V-ing"},{"cat":"Inversion","type":"qcm","q":"Not only ___ late, but he also forgot the documents.","choices":["he was","was he","he had been","had been he"],"a":1,"tip":"Not only → inversion du sujet et de l'auxiliaire"},{"cat":"Inversion","type":"qcm","q":"Rarely ___ such dedication in a young employee.","choices":["I have seen","have I seen","I had seen","did I saw"],"a":1,"tip":"Adverbe négatif en tête → inversion"},{"cat":"Inversion","type":"qcm","q":"Hardly ___ down when the phone rang.","choices":["I had sat","I sat","had I sat","did I sit"],"a":2,"tip":"Hardly → inversion avec past perfect"},{"cat":"Inversion","type":"trou","q":"Never ___ (have / I / see) such a beautiful sunset.","a":"have I seen","tip":"Never en tête → inversion : never + have + sujet + pp"},{"cat":"Inversion","type":"trou","q":"___ (Should / you) need any help, don't hesitate to call.","a":"Should you","tip":"Inversion conditionnelle : Should + sujet (= If you should)"},{"cat":"Wish / If only","type":"qcm","q":"I wish I ___ speak Japanese.","choices":["can","could","would","was"],"a":1,"tip":"Souhait présent irréel → wish + could/past simple"},{"cat":"Wish / If only","type":"qcm","q":"She wishes she ___ so hard yesterday.","choices":["didn't work","hadn't worked","doesn't work","wouldn't work"],"a":1,"tip":"Regret sur le passé → wish + past perfect"},{"cat":"Wish / If only","type":"qcm","q":"I wish you ___ make so much noise!","choices":["don't","didn't","wouldn't","won't"],"a":2,"tip":"Irritation → wish + would (demande de changement)"},{"cat":"Wish / If only","type":"trou","q":"If only I ___ (know) the answer — I'd have told you.","a":"had known","tip":"Regret passé → if only + past perfect"},{"cat":"Wish / If only","type":"trou","q":"He wishes he ___ (be) taller.","a":"were","tip":"Souhait irréel → wish + were (subjonctif)"},{"cat":"Subjonctif formel","type":"qcm","q":"It is essential that every student ___ on time.","choices":["is","be","will be","would be"],"a":1,"tip":"Subjonctif présent après 'essential that' → forme de base"},{"cat":"Subjonctif formel","type":"qcm","q":"The committee recommended that he ___ the report.","choices":["submits","submit","submitted","would submit"],"a":1,"tip":"recommend/suggest/insist that → subjonctif (forme de base)"},{"cat":"Subjonctif formel","type":"trou","q":"It is crucial that she ___ (attend) the meeting.","a":"attend","tip":"Subjonctif : it is crucial that + forme de base"},{"cat":"Subjonctif formel","type":"trou","q":"The doctor insisted that he ___ (rest) for a week.","a":"rest","tip":"insist that → subjonctif (forme de base, pas de -s)"},{"cat":"Passif complexe","type":"qcm","q":"The results are expected ___ next week.","choices":["announced","to be announced","being announced","to announce"],"a":1,"tip":"Passif infinitif → to be + pp"},{"cat":"Passif complexe","type":"qcm","q":"She is said ___ the best surgeon in the country.","choices":["being","to be","that she is","to have been"],"a":1,"tip":"Verbe de rapport au passif → is said to be"},{"cat":"Passif complexe","type":"qcm","q":"The bridge ___ for two years before it opens.","choices":["will build","will have been built","is building","has built"],"a":1,"tip":"Passif futur antérieur → will have been + pp"},{"cat":"Passif complexe","type":"trou","q":"The suspect is believed ___ (flee) the country.","a":"to have fled","tip":"Passif + infinitif passé → to have + pp"},{"cat":"Passif complexe","type":"trou","q":"He was made ___ (apologise) publicly.","a":"to apologise","tip":"Make au passif → was made + to + infinitif"},{"cat":"Modaux avancés","type":"qcm","q":"You ___ told me earlier — now it's too late.","choices":["should","should have","must","ought"],"a":1,"tip":"Critique d'action passée → should have + pp"},{"cat":"Modaux avancés","type":"qcm","q":"He ___ be at home — his car is in the driveway.","choices":["must","should","can","ought"],"a":0,"tip":"Déduction logique forte → must (quasi-certitude)"},{"cat":"Modaux avancés","type":"qcm","q":"They ___ have left early — the meeting was still going.","choices":["can't","mustn't","shouldn't","wouldn't"],"a":0,"tip":"Déduction négative → can't have + pp"},{"cat":"Modaux avancés","type":"qcm","q":"You ___ submit the form by Friday at the latest.","choices":["could","need to","dare","ought"],"a":1,"tip":"Obligation pratique → need to (plus naturel que must)"},{"cat":"Modaux avancés","type":"trou","q":"She ___ (could / finish) the project, but she chose not to.","a":"could have finished","tip":"Possibilité non réalisée → could have + pp"},{"cat":"Modaux avancés","type":"trou","q":"You ___ (need not / come) — we cancelled the meeting.","a":"needn't have come","tip":"Action inutile accomplie → needn't have + pp"},{"cat":"Discours indirect avancé","type":"qcm","q":"He asked me ___ I had finished the report.","choices":["if","that","whether or not","both a and c"],"a":3,"tip":"Question indirecte oui/non → if ou whether"},{"cat":"Discours indirect avancé","type":"qcm","q":"She told me ___ the next day.","choices":["to come","that come","come","coming"],"a":0,"tip":"Ordre indirect → told + to + infinitif"},{"cat":"Discours indirect avancé","type":"qcm","q":"'I will call you tomorrow.' → She promised ___.","choices":["to call me the next day","that she will call me tomorrow","calling me tomorrow","to call me tomorrow"],"a":0,"tip":"Promise → promised to + inf ; tomorrow → the next day"},{"cat":"Discours indirect avancé","type":"trou","q":"'Don't touch that!' → She warned him ___ that.","a":"not to touch","tip":"Interdiction indirecte → warned + not to + infinitif"},{"cat":"Discours indirect avancé","type":"trou","q":"'Why didn't you call?' → She asked me ___ called.","a":"why I hadn't","tip":"Question indirecte → why + sujet + auxiliaire (ordre affirmatif)"},{"cat":"Gérondif vs infinitif","type":"qcm","q":"I remember ___ her at the conference last year.","choices":["to meet","meeting","meet","to have met"],"a":1,"tip":"remember + V-ing = souvenir d'un fait passé"},{"cat":"Gérondif vs infinitif","type":"qcm","q":"Please remember ___ lock the door before leaving.","choices":["locking","to lock","lock","locked"],"a":1,"tip":"remember + to-inf = ne pas oublier de faire qqch"},{"cat":"Gérondif vs infinitif","type":"qcm","q":"He regrets ___ so much time on social media.","choices":["to waste","waste","wasting","to wasting"],"a":2,"tip":"regret + V-ing = regret sur le passé"},{"cat":"Gérondif vs infinitif","type":"qcm","q":"She stopped ___ when she had children.","choices":["to work","working","work","worked"],"a":1,"tip":"stop + V-ing = cesser de faire ; stop + to-inf = s'arrêter pour faire"},{"cat":"Gérondif vs infinitif","type":"trou","q":"I tried ___ (call) him but got no answer.","a":"calling","tip":"try + V-ing = tenter une approche ; try + to-inf = faire un effort"},{"cat":"Gérondif vs infinitif","type":"trou","q":"They went on ___ (discuss) the issue for hours.","a":"discussing","tip":"go on + V-ing = continuer à faire"},{"cat":"Articles avancés","type":"qcm","q":"___ unemployed need better support from the government.","choices":["A","An","The","—"],"a":2,"tip":"The + adjectif = groupe de personnes (the unemployed = les chômeurs)"},{"cat":"Articles avancés","type":"qcm","q":"She plays ___ violin in a professional orchestra.","choices":["a","an","the","—"],"a":2,"tip":"Instrument de musique → the (sauf sports)"},{"cat":"Articles avancés","type":"trou","q":"He was elected ___ president of the association.","a":"—","tip":"Titre unique après elected/appointed → zéro article"},{"cat":"Connecteurs avancés","type":"qcm","q":"___ the heavy rain, the match continued.","choices":["Despite","Although","Even though","Whereas"],"a":0,"tip":"Despite/In spite of + nom/gérondif (pas de sujet-verbe)"},{"cat":"Connecteurs avancés","type":"qcm","q":"The project failed, ___ it had received strong funding.","choices":["despite","although","however","unless"],"a":1,"tip":"Although + proposition complète (sujet + verbe)"},{"cat":"Connecteurs avancés","type":"qcm","q":"___ careful she was, she always made small mistakes.","choices":["However","Although","Despite","Whenever"],"a":0,"tip":"However + adjectif/adverbe = quelle que soit la mesure"},{"cat":"Connecteurs avancés","type":"trou","q":"She is brilliant; ___, she still makes the occasional mistake.","a":"however","tip":"Connecteur adversatif entre deux phrases → however (avec point-virgule)"},{"cat":"Connecteurs avancés","type":"trou","q":"___ to popular belief, coffee doesn't dehydrate you.","a":"Contrary","tip":"Contrary to popular belief = contrairement aux idées reçues"},{"cat":"Phrasal verbs avancés","type":"qcm","q":"The meeting was ___ until the following week.","choices":["put off","put out","put down","put away"],"a":0,"tip":"put off = reporter (≠ put out = éteindre)"},{"cat":"Phrasal verbs avancés","type":"qcm","q":"She ___ a brilliant idea during the brainstorm.","choices":["came up with","came across","came round","came out"],"a":0,"tip":"come up with = trouver/avoir (une idée)"},{"cat":"Phrasal verbs avancés","type":"qcm","q":"He ___ the offer without even reading it.","choices":["turned up","turned down","turned out","turned around"],"a":1,"tip":"turn down = refuser (une offre, une personne)"},{"cat":"Phrasal verbs avancés","type":"trou","q":"It turned ___ that she had been right all along.","a":"out","tip":"turn out = s'avérer (it turned out that...)"},{"cat":"Phrasal verbs avancés","type":"trou","q":"I can't ___ with the noise in this office. (put)","a":"put up","tip":"put up with = supporter, tolérer"},{"cat":"Questions tags","type":"qcm","q":"She can swim, ___?","choices":["can she","can't she","doesn't she","isn't she"],"a":1,"tip":"Auxiliaire can → tag négatif : can't she"},{"cat":"Questions tags","type":"qcm","q":"Nobody called, ___?","choices":["did they","didn't they","did nobody","did he"],"a":0,"tip":"Nobody/nobody → tag affirmatif avec they"},{"cat":"Questions tags","type":"qcm","q":"Let's take a break, ___?","choices":["will we","shall we","do we","don't we"],"a":1,"tip":"Let's → tag : shall we ?"},{"cat":"Questions tags","type":"trou","q":"You've never been to Japan, ___?","a":"have you","tip":"Présent perfect négatif → tag affirmatif : have you"},{"cat":"Questions tags","type":"trou","q":"Everything went smoothly, ___?","a":"didn't it","tip":"Everything → singulier neutre → it ; passé affirmatif → didn't it"}];
var exDeck = [], exIdx = 0, exScores = {}, exAnswered = false, exInited = false;

function exInit() {
  var cats = [];
  GRAMMAR.forEach(function(g) { if (cats.indexOf(g.cat) < 0) cats.push(g.cat); });
  var sel = document.getElementById('ex-cat');
  sel.innerHTML = '<option value="all">Toutes les catégories</option>';
  cats.forEach(function(c) {
    var o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
  exBuild();
}

function exBuild() {
  var cat = document.getElementById('ex-cat').value;
  var type = document.getElementById('ex-type').value;
  var base = cat === 'all' ? GRAMMAR : GRAMMAR.filter(function(g) { return g.cat === cat; });
  if (type !== 'all') base = base.filter(function(g) { return g.type === type; });
  exDeck = base.slice();
  exIdx = 0; exAnswered = false; exScores = {};
  exUpdateStats(); exRender();
}

function exShuffle() {
  for (var i = exDeck.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = exDeck[i]; exDeck[i] = exDeck[j]; exDeck[j] = tmp;
  }
  exIdx = 0; exAnswered = false; exRender();
}

function exReset() { exScores = {}; exIdx = 0; exAnswered = false; exBuild(); }

function exRender() {
  if (!exDeck.length) return;
  var ex = exDeck[exIdx];
  exAnswered = false;
  document.getElementById('ex-cat-tag').textContent = ex.cat;
  document.getElementById('ex-num').textContent = (exIdx + 1) + ' / ' + exDeck.length;
  document.getElementById('ex-nav-info').textContent = (exIdx + 1) + ' / ' + exDeck.length;
  document.getElementById('ex-next-btn').style.display = 'none';
  document.getElementById('ex-feedback').style.display = 'none';
  document.getElementById('ex-question').textContent = ex.q;
  document.getElementById('ex-pbar').style.width = Math.round((exIdx + 1) / exDeck.length * 100) + '%';

  if (ex.type === 'qcm') {
    document.getElementById('ex-choices').style.display = 'grid';
    document.getElementById('ex-trou-wrap').style.display = 'none';
    var choicesEl = document.getElementById('ex-choices');
    choicesEl.innerHTML = '';
    ex.choices.forEach(function(c, i) {
      var btn = document.createElement('button');
      btn.className = 'ex-choice-btn';
      btn.textContent = c;
      btn.setAttribute('data-idx', i);
      btn.onclick = function() { exCheckQCM(i); };
      choicesEl.appendChild(btn);
    });
  } else {
    document.getElementById('ex-choices').style.display = 'none';
    document.getElementById('ex-trou-wrap').style.display = 'flex';
    var inp = document.getElementById('ex-trou-input');
    inp.value = '';
    inp.disabled = false;
    inp.style.borderColor = '#ccc';
    inp.style.background = 'white';
    setTimeout(function() { inp.focus(); }, 150);
  }
}

function exCheckQCM(choiceIdx) {
  if (exAnswered) return;
  exAnswered = true;
  var ex = exDeck[exIdx];
  var correct = choiceIdx === ex.a;
  exScores[exIdx] = correct;
  var btns = document.querySelectorAll('.ex-choice-btn');
  btns.forEach(function(b, i) {
    b.disabled = true;
    if (i === ex.a) b.classList.add('ex-correct');
    else if (i === choiceIdx && !correct) b.classList.add('ex-wrong');
  });
  exShowFeedback(correct, ex.choices[ex.a], ex.tip);
  exUpdateStats();
}

function exCheckTrou() {
  if (exAnswered) return;
  var ex = exDeck[exIdx];
  var inp = document.getElementById('ex-trou-input');
  var val = inp.value.trim().toLowerCase();
  var correct = val === ex.a.toLowerCase();
  exScores[exIdx] = correct;
  exAnswered = true;
  inp.disabled = true;
  inp.style.borderColor = correct ? '#86efac' : '#fca5a5';
  inp.style.background = correct ? '#f0fdf4' : '#fef2f2';
  exShowFeedback(correct, ex.a, ex.tip);
  exUpdateStats();
}

document.getElementById('ex-trou-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') exCheckTrou();
});

function exShowFeedback(correct, answer, tip) {
  var fb = document.getElementById('ex-feedback');
  var res = document.getElementById('ex-feedback-result');
  var tipEl = document.getElementById('ex-feedback-tip');
  fb.style.display = 'block';
  res.textContent = correct ? 'Correct !' : 'Réponse : ' + answer;
  res.className = 'ex-feedback-result ' + (correct ? 'result-ok' : 'result-ko');
  tipEl.textContent = tip || '';
  document.getElementById('ex-next-btn').style.display = 'inline-block';
}

function exGo(dir) {
  exIdx = (exIdx + dir + exDeck.length) % exDeck.length;
  exAnswered = false; exRender();
}

function exNext() {
  if (exIdx < exDeck.length - 1) { exIdx++; exAnswered = false; exRender(); }
  else { showToast('Exercice terminé ! ' + document.getElementById('ex-s-pct').textContent); }
}

function exUpdateStats() {
  var vals = Object.values(exScores);
  var ok = vals.filter(function(v) { return v === true; }).length;
  var ko = vals.filter(function(v) { return v === false; }).length;
  document.getElementById('ex-s-total').textContent = exDeck.length;
  document.getElementById('ex-s-ok').textContent = ok;
  document.getElementById('ex-s-ko').textContent = ko;
  var rated = ok + ko;
  document.getElementById('ex-s-pct').textContent = rated > 0 ? Math.round(ok / rated * 100) + '%' : '—';
}

var defiPool = [], defiShuffled = [], defiIdx = 0;
var defiStreak = 0, defiRecord = 0, defiOk = 0, defiKo = 0;
var defiAnswered = false, defiInited = false, defiMode = 'en';

function defiInitTab() {
  if (defiInited) return;
  defiInited = true;
  var sel = document.getElementById('defi-fiche');
  sel.innerHTML = '<option value="all">Toutes les fiches</option>';
  fiches.forEach(function(f) {
    var theme = ALL.find(function(d) { return d.fiche === f; }).theme;
    var o = document.createElement('option');
    o.value = f; o.textContent = f + ' — ' + theme;
    sel.appendChild(o);
  });
  defiBuild();
}

function defiBuild() {
  var fv = document.getElementById('defi-fiche').value;
  defiPool = fv === 'all' ? ALL.slice() : ALL.filter(function(d) { return d.fiche === fv; });
  // Shuffle pool
  for (var i = defiPool.length-1; i>0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = defiPool[i]; defiPool[i] = defiPool[j]; defiPool[j] = tmp;
  }
  defiShuffled = defiPool.slice();
  defiIdx = 0; defiStreak = 0; defiOk = 0; defiKo = 0;
  defiUpdateStats();
  document.getElementById('defi-start-btn').style.display = 'block';
  document.getElementById('defi-restart-btn').style.display = 'none';
  document.getElementById('defi-next-btn').style.display = 'none';
  document.getElementById('defi-feedback').style.display = 'none';
  document.getElementById('defi-choices').innerHTML = '';
  document.getElementById('defi-question').textContent = 'Prêt ? Lance le défi !';
  document.getElementById('defi-fiche-tag').textContent = '';
}

function defiStart() {
  defiBuild();
  document.getElementById('defi-start-btn').style.display = 'none';
  document.getElementById('defi-restart-btn').style.display = 'none';
  document.getElementById('defi-g-left').style.display = 'block';
  document.getElementById('defi-g-right').style.display = 'block';
  document.getElementById('defi-streak-display').style.display = 'block';
  document.getElementById('defi-streak-label').style.display = 'block';
  drawHermes(document.getElementById('defi-g-left'), 'idle');
  drawPhilo(document.getElementById('defi-g-right'), 'idle');
  defiRender();
}

function defiRender() {
  if (defiIdx >= defiShuffled.length) {
    defiShuffled = defiPool.slice();
    for (var i = defiShuffled.length-1; i>0; i--) {
      var j = Math.floor(Math.random()*(i+1));
      var tmp = defiShuffled[i]; defiShuffled[i] = defiShuffled[j]; defiShuffled[j] = tmp;
    }
    defiIdx = 0;
  }
  var card = defiShuffled[defiIdx];
  var mv = document.getElementById('defi-mode').value;
  defiMode = mv === 'rand' ? (Math.random() > 0.5 ? 'en' : 'fr') : mv;
  var q = defiMode === 'en' ? card.en : card.fr;
  var correct = defiMode === 'en' ? card.fr : card.en;

  document.getElementById('defi-fiche-tag').textContent = card.fiche + ' · ' + card.theme;
  document.getElementById('defi-question').textContent = q;
  document.getElementById('defi-next-btn').style.display = 'none';
  document.getElementById('defi-feedback').style.display = 'none';
  defiAnswered = false;
  var gl = document.getElementById('defi-g-left');
  var gr = document.getElementById('defi-g-right');
  if (gl.style.display !== 'none') { drawHermes(gl, 'idle'); drawPhilo(gr, 'idle'); }

  // Build 4 choices: 1 correct + 3 random wrong
  var wrong = [];
  var pool = defiPool.slice();
  for (var i = pool.length-1; i>0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  pool.forEach(function(c) {
    var cval = defiMode === 'en' ? c.fr : c.en;
    if (cval !== correct && wrong.length < 3) wrong.push(cval);
  });
  while (wrong.length < 3) wrong.push('—');

  var choices = [correct, wrong[0], wrong[1], wrong[2]];
  // Shuffle choices
  for (var i = choices.length-1; i>0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = choices[i]; choices[i] = choices[j]; choices[j] = tmp;
  }

  var el = document.getElementById('defi-choices');
  el.innerHTML = '';
  choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'ex-choice-btn';
    btn.textContent = c;
    btn.onclick = (function(val) { return function() { defiCheck(val, correct, card); }; })(c);
    el.appendChild(btn);
  });
}

function defiCheck(chosen, correct, card) {
  if (defiAnswered) return;
  defiAnswered = true;
  var ok = chosen === correct;
  var btns = document.querySelectorAll('#defi-choices .ex-choice-btn');
  btns.forEach(function(b) {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('ex-correct');
    else if (b.textContent === chosen && !ok) b.classList.add('ex-wrong');
  });
  var fb = document.getElementById('defi-feedback');
  var res = document.getElementById('defi-feedback-result');
  var tip = document.getElementById('defi-feedback-tip');
  fb.style.display = 'block';
  tip.textContent = card.ex || '';
  if (ok) {
    defiStreak++; defiOk++;
    if (defiStreak > defiRecord) defiRecord = defiStreak;
    res.textContent = 'Correct ! Série : ' + defiStreak;
    res.className = 'ex-feedback-result result-ok';
    defiUpdateStats();
    document.getElementById('defi-streak-display').textContent = defiStreak;
    drawHermes(document.getElementById('defi-g-left'), 'happy');
    drawPhilo(document.getElementById('defi-g-right'), 'happy');
    document.getElementById('defi-next-btn').style.display = 'block';
  } else {
    defiKo++;
    res.textContent = 'Raté ! Réponse : ' + correct + ' — Record : ' + defiRecord;
    res.className = 'ex-feedback-result result-ko';
    defiStreak = 0;
    defiUpdateStats();
    document.getElementById('defi-streak-display').textContent = 0;
    drawHermes(document.getElementById('defi-g-left'), 'sad');
    drawPhilo(document.getElementById('defi-g-right'), 'sad');
    document.getElementById('defi-next-btn').style.display = 'none';
    document.getElementById('defi-restart-btn').style.display = 'block';
  }
}

function defiNext() {
  defiIdx++;
  defiRender();
}

function defiUpdateStats() {
  document.getElementById('defi-s-streak').textContent = defiStreak;
  document.getElementById('defi-s-record').textContent = defiRecord;
  document.getElementById('defi-s-ok').textContent = defiOk;
  document.getElementById('defi-s-ko').textContent = defiKo;
  var sd = document.getElementById('defi-streak-display');
  if (sd.style.display !== 'none') sd.textContent = defiStreak;
}



/* ===== PIXEL ART ===== */

function px(ctx, x, y, color, size) {
  if (size === undefined) size = 5;
  ctx.fillStyle = color;
  ctx.fillRect(x * size, y * size, size, size);
}

// Queen's Guard LEFT (facing right)
function drawHermes(canvas, state) {
  var ctx = canvas.getContext('2d');
  var s = 5;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  var D = function(x, y, c) { ctx.fillStyle = c; ctx.fillRect(x*s, y*s, s, s); };
  var R = function(x1, y1, x2, y2, c) { ctx.fillStyle = c; ctx.fillRect(x1*s, y1*s, (x2-x1+1)*s, (y2-y1+1)*s); };

  // Bearskin hat (tall black fur hat)
  R(7, 0, 15, 8, '#111111');
  // Hat shine
  D(8, 1, '#2a2a2a'); D(9, 1, '#2a2a2a');
  // Chin strap
  D(8, 9, '#d4a020'); D(9, 9, '#d4a020'); D(10, 9, '#d4a020');

  // Face
  R(8, 9, 14, 13, '#f4c28a');
  // Eyes
  D(9, 10, '#1a0a00'); D(13, 10, '#1a0a00');
  // Nose
  D(11, 11, '#d4956a');
  // Mouth — changes with state
  if (state === 'happy') {
    D(10, 12, '#8b3a2a'); D(11, 12, '#c04a3a'); D(12, 12, '#8b3a2a');
    D(9, 13, '#8b3a2a'); D(13, 13, '#8b3a2a');
  } else if (state === 'sad') {
    D(9, 13, '#8b3a2a'); D(10, 13, '#8b3a2a'); D(11, 13, '#8b3a2a'); D(12, 13, '#8b3a2a'); D(13, 13, '#8b3a2a');
    D(10, 12, '#8b3a2a'); D(12, 12, '#8b3a2a');
  } else {
    D(10, 12, '#8b3a2a'); D(11, 12, '#8b3a2a'); D(12, 12, '#8b3a2a');
  }

  // Red tunic — royal scarlet
  R(7, 14, 15, 26, '#c0182a');
  // Gold buttons down the front
  D(11, 15, '#d4a020'); D(11, 17, '#d4a020'); D(11, 19, '#d4a020');
  D(11, 21, '#d4a020'); D(11, 23, '#d4a020');
  // Gold epaulettes
  R(5, 14, 7, 15, '#d4a020'); R(15, 14, 17, 15, '#d4a020');
  // White belt
  R(7, 24, 15, 25, '#f0f0f0');
  // Gold belt buckle
  D(10, 24, '#d4a020'); D(11, 24, '#d4a020');

  // Arms
  R(4, 15, 6, 25, '#c0182a'); // left arm
  R(16, 15, 18, 25, '#c0182a'); // right arm
  // White gloves
  R(4, 25, 6, 27, '#f0f0f0');
  R(16, 25, 18, 27, '#f0f0f0');

  // Rifle (right side)
  R(19, 12, 20, 30, '#5a3a1a'); // stock
  R(19, 10, 20, 12, '#888888'); // barrel

  // Black trousers
  R(7, 27, 11, 38, '#1a1a2e');
  R(11, 27, 15, 38, '#1a1a2e');
  // Trouser crease
  D(11, 27, '#2a2a4a'); D(11, 28, '#2a2a4a'); D(11, 29, '#2a2a4a');

  // Black boots
  R(7, 38, 11, 42, '#0a0a0a');
  R(11, 38, 15, 42, '#0a0a0a');
  // Boot shine
  D(8, 39, '#2a2a2a'); D(12, 39, '#2a2a2a');

  // Happy: small stars above
  if (state === 'happy') {
    D(3, 3, '#d4a020'); D(5, 1, '#d4a020'); D(18, 2, '#c0182a'); D(20, 4, '#d4a020');
  }
  // Sad: sweat drops
  if (state === 'sad') {
    D(18, 10, '#6ab0f0'); D(19, 12, '#6ab0f0'); D(3, 8, '#6ab0f0');
  }
}

// Queen's Guard RIGHT (mirror, facing left)
function drawPhilo(canvas, state) {
  var ctx = canvas.getContext('2d');
  var s = 5;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  var D = function(x, y, c) { ctx.fillStyle = c; ctx.fillRect(x*s, y*s, s, s); };
  var R = function(x1, y1, x2, y2, c) { ctx.fillStyle = c; ctx.fillRect(x1*s, y1*s, (x2-x1+1)*s, (y2-y1+1)*s); };

  // Mirror of left guard (shifted to face left)
  // Bearskin hat
  R(7, 0, 15, 8, '#111111');
  D(13, 1, '#2a2a2a'); D(14, 1, '#2a2a2a');
  // Chin strap
  D(12, 9, '#d4a020'); D(13, 9, '#d4a020'); D(14, 9, '#d4a020');

  // Face (mirrored)
  R(8, 9, 14, 13, '#f4c28a');
  D(9, 10, '#1a0a00'); D(13, 10, '#1a0a00');
  D(11, 11, '#d4956a');
  if (state === 'happy') {
    D(10, 12, '#8b3a2a'); D(11, 12, '#c04a3a'); D(12, 12, '#8b3a2a');
    D(9, 13, '#8b3a2a'); D(13, 13, '#8b3a2a');
  } else if (state === 'sad') {
    D(9, 13, '#8b3a2a'); D(10, 13, '#8b3a2a'); D(11, 13, '#8b3a2a'); D(12, 13, '#8b3a2a'); D(13, 13, '#8b3a2a');
    D(10, 12, '#8b3a2a'); D(12, 12, '#8b3a2a');
  } else {
    D(10, 12, '#8b3a2a'); D(11, 12, '#8b3a2a'); D(12, 12, '#8b3a2a');
  }

  // Red tunic
  R(7, 14, 15, 26, '#c0182a');
  D(11, 15, '#d4a020'); D(11, 17, '#d4a020'); D(11, 19, '#d4a020');
  D(11, 21, '#d4a020'); D(11, 23, '#d4a020');
  R(5, 14, 7, 15, '#d4a020'); R(15, 14, 17, 15, '#d4a020');
  R(7, 24, 15, 25, '#f0f0f0');
  D(11, 24, '#d4a020'); D(12, 24, '#d4a020');

  // Arms (mirrored)
  R(4, 15, 6, 25, '#c0182a');
  R(16, 15, 18, 25, '#c0182a');
  R(4, 25, 6, 27, '#f0f0f0');
  R(16, 25, 18, 27, '#f0f0f0');

  // Rifle (left side, mirrored)
  R(2, 12, 3, 30, '#5a3a1a');
  R(2, 10, 3, 12, '#888888');

  // Trousers
  R(7, 27, 11, 38, '#1a1a2e');
  R(11, 27, 15, 38, '#1a1a2e');
  D(11, 27, '#2a2a4a'); D(11, 28, '#2a2a4a'); D(11, 29, '#2a2a4a');

  // Boots
  R(7, 38, 11, 42, '#0a0a0a');
  R(11, 38, 15, 42, '#0a0a0a');
  D(8, 39, '#2a2a2a'); D(12, 39, '#2a2a2a');

  if (state === 'happy') {
    D(3, 3, '#c0182a'); D(1, 1, '#d4a020'); D(18, 3, '#d4a020'); D(20, 1, '#c0182a');
  }
  if (state === 'sad') {
    D(4, 10, '#6ab0f0'); D(3, 12, '#6ab0f0'); D(18, 8, '#6ab0f0');
  }
}
